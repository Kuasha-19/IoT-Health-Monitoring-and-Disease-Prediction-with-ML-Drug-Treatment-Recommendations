<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Analysis System</title>
    <style>
      /* Unique Modern Minimalist Design */
      :root {
        --accent: #0052cc;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --card-bg: #ffffff;
        --text-main: #1a1a1b;
        --text-sub: #5f6368;
        --border: #dadce0;
      }

      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-gradient);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 700px;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 2px; /* Professional sharp edges */
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }

      .header {
        border-bottom: 2px solid var(--accent);
        padding-bottom: 15px;
        margin-bottom: 35px;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-sub);
        text-transform: uppercase;
        margin-bottom: 20px;
        display: block;
      }

      .input-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        margin-bottom: 40px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
      }

      .input-group label {
        font-size: 13px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input[type="number"] {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="number"]:focus {
        border-color: var(--accent);
      }

      /* Checkbox List Styling */
      .symptoms-container {
        background: #f8f9fa;
        padding: 25px;
        border-radius: 4px;
        margin-bottom: 30px;
      }

      .symptom-item {
        display: flex;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }

      .symptom-item:last-child {
        border-bottom: none;
      }

      .symptom-item label {
        font-size: 14px;
        margin-left: 12px;
        cursor: pointer;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .action-area {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      button {
        padding: 16px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.3s;
      }

      .btn-submit {
        background: var(--accent);
        color: white;
      }

      .btn-submit:hover {
        background: #003d99;
        box-shadow: 0 5px 15px rgba(0, 82, 204, 0.3);
      }

      .btn-back {
        background: transparent;
        color: var(--text-sub);
        border: 1px solid var(--border);
      }

      .btn-back:hover {
        background: #eee;
      }

      /* Result Section */
      #resultBox {
        margin-top: 30px;
        padding: 25px;
        border-left: 5px solid var(--accent);
        background: #eff6ff;
        display: none;
      }

      #predictionResult {
        font-size: 18px;
        margin: 0 0 10px 0;
      }

      #predictionScore {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }

      @media (max-width: 600px) {
        .input-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Patient Health Analysis</h1>
      </div>

      <form id="predictionForm">
        <span class="section-title">Quantitative Vitals</span>
        <div class="input-grid">
          <div class="input-group">
            <label>Temperature (Celsius)</label>
            <input
              type="number"
              id="temp"
              step="0.1"
              placeholder="37.0"
              required
            />
          </div>
          <div class="input-group">
            <label>Heart Rate (BPM)</label>
            <input type="number" id="heart_rate" placeholder="80" required />
          </div>
          <div class="input-group">
            <label>Diastolic BP</label>
            <input type="number" id="bp_dia" placeholder="80" required />
          </div>
          <div class="input-group">
            <label>Systolic BP</label>
            <input type="number" id="bp_sys" placeholder="120" required />
          </div>
          <div class="input-group">
            <label>Humidity Percentage</label>
            <input type="number" id="humidity" placeholder="45" required />
          </div>
        </div>

        <span class="section-title">Symptom Assessment</span>
        <div class="symptoms-container">
          <div class="symptom-item">
            <input type="checkbox" id="fever" />
            <label for="fever">Fever Presence</label>
          </div>
          <div class="symptom-item">
            <input type="checkbox" id="cough" />
            <label for="cough">Persistent Cough</label>
          </div>
          <div class="symptom-item">
            <input type="checkbox" id="chest_pain" />
            <label for="chest_pain">Chest Discomfort</label>
          </div>
          <div class="symptom-item">
            <input type="checkbox" id="shortness_breath" />
            <label for="shortness_breath">Shortness of Breath</label>
          </div>
          <div class="symptom-item">
            <input type="checkbox" id="fatigue" />
            <label for="fatigue">Unusual Fatigue</label>
          </div>
          <div class="symptom-item">
            <input type="checkbox" id="headache" />
            <label for="headache">Severe Headache</label>
          </div>
        </div>

        <div class="action-area">
          <button type="submit" class="btn-submit">
            Process Clinical Data
          </button>
          <button
            type="button"
            class="btn-back"
            onclick="window.location.href = '../dashboard.html'"
          >
            Return to Dashboard
          </button>
        </div>
      </form>

      <div id="resultBox">
        <h3 id="predictionResult">Analysis Status</h3>
        <p id="predictionScore">Pending Evaluation</p>
      </div>
    </div>

    <script src="../predictor.js"></script>
  </body>
</html>
