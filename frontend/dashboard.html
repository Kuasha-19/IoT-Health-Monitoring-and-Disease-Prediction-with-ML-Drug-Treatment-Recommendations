<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthBridge | Portal Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .hidden {
        display: none !important;
      }
      .split-container {
        display: flex;
        gap: 20px;
        height: calc(100vh - 120px);
      }
      .analysis-panel {
        flex: 1;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        overflow-y: auto;
        border: 1px solid #e0e7ff;
      }
      .scrollable-list {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid #eee;
        margin-bottom: 15px;
        border-radius: 6px;
      }
      .patient-item {
        padding: 8px;
        border-bottom: 1px solid #f5f5f5;
        cursor: pointer;
        font-size: 0.9em;
      }
      .patient-item:hover {
        background: #f0f7ff;
      }
      .graph-box {
        margin-bottom: 25px;
        height: 200px;
      }
      .feedback-area {
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 15px;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        margin-bottom: 10px;
        resize: none;
      }
      .btn-send {
        background: #2563eb;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-delete {
        background: #ef4444;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        float: right;
      }
      .advice-card {
        background: #fff4e5;
        border-left: 4px solid #ff9800;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body class="dashboard-body">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-hand-holding-medical"></i>
        <span>HealthBridge</span>
      </div>
      <div class="user-profile-brief">
        <img
          src="https://ui-avatars.com/api/?name=User&background=random"
          id="userAvatar"
          alt="Profile"
        />
        <div class="info">
          <h4 id="displayUserName">Loading...</h4>
          <p id="displayUserId">ID: ----</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link active" onclick="showSection('overview')"
          ><i class="fas fa-th-large"></i> Overview</a
        >
        <div id="patientLinks">
          <a href="pages/predictor.html" class="nav-link"
            ><i class="fas fa-robot"></i> AI Predictor</a
          >
          <a href="#" class="nav-link" onclick="showSection('reports')"
            ><i class="fas fa-file-medical"></i> My Reports</a
          >
        </div>
        <div id="doctorLinks" class="hidden">
          <a href="#" class="nav-link" onclick="showSection('manage-patients')"
            ><i class="fas fa-users"></i> Manage Patients</a
          >
        </div>
        <a href="index.html" class="nav-link logout"
          ><i class="fas fa-sign-out-alt"></i> Logout</a
        >
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h2 id="sectionTitle">Overview</h2>
        <div class="role-badge" id="roleBadge">Patient</div>
      </header>

      <section id="overview" class="content-section">
        <div id="patientAdviceArea"></div>
        <div class="welcome-banner" id="welcomeBanner">
          <h3>Hello, <span id="welcomeName">User</span>!</h3>
          <p>Welcome to your portal. Here is your recent health activity.</p>
          <button
            id="startCheckupBtn"
            onclick="window.location.href = 'pages/predictor.html'"
            style="
              margin-top: 15px;
              padding: 10px 20px;
              background: #fff;
              color: #2563eb;
              border: none;
              border-radius: 8px;
              font-weight: bold;
            "
          >
            Start Checkup
          </button>
        </div>
        <div
          class="chart-container"
          style="
            margin-top: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
          "
        >
          <h4>Risk Probability Trend</h4>
          <canvas id="healthChart"></canvas>
        </div>
      </section>

      <section id="reports" class="content-section hidden">
        <div id="patientReportList"></div>
      </section>

      <section id="manage-patients" class="content-section hidden">
        <div class="split-container">
          <div class="analysis-panel" id="sideA">
            <input
              type="text"
              id="inputA"
              placeholder="Search Patient A..."
              onkeyup="liveSearch('A')"
              style="width: 100%; padding: 10px; margin-bottom: 10px"
            />
            <div id="listA" class="scrollable-list"></div>
            <div id="dataA" class="hidden">
              <h4 id="nameA">Patient A</h4>
              <div class="graph-box"><canvas id="chartA_risk"></canvas></div>
              <div class="graph-box"><canvas id="chartA_hr"></canvas></div>
              <div class="graph-box"><canvas id="chartA_bp"></canvas></div>
              <div class="feedback-area">
                <textarea
                  id="msgA"
                  placeholder="Type direct instructions for this patient..."
                ></textarea>
                <button class="btn-send" onclick="sendAdvice('A')">
                  Send Advice
                </button>
                <button class="btn-delete" onclick="deleteRecord('A')">
                  Delete Data
                </button>
              </div>
            </div>
          </div>
          <div class="analysis-panel" id="sideB">
            <input
              type="text"
              id="inputB"
              placeholder="Search Patient B..."
              onkeyup="liveSearch('B')"
              style="width: 100%; padding: 10px; margin-bottom: 10px"
            />
            <div id="listB" class="scrollable-list"></div>
            <div id="dataB" class="hidden">
              <h4 id="nameB">Patient B</h4>
              <div class="graph-box"><canvas id="chartB_risk"></canvas></div>
              <div class="graph-box"><canvas id="chartB_hr"></canvas></div>
              <div class="graph-box"><canvas id="chartB_bp"></canvas></div>
              <div class="feedback-area">
                <textarea
                  id="msgB"
                  placeholder="Type direct instructions for this patient..."
                ></textarea>
                <button class="btn-send" onclick="sendAdvice('B')">
                  Send Advice
                </button>
                <button class="btn-delete" onclick="deleteRecord('B')">
                  Delete Data
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="dashboard.js"></script>
  </body>
</html>
