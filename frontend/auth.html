<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthBridge | Portal Authentication</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="main-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand-mark">HB</div>
          <div class="brand-text">
            <h1>Health<span>Bridge</span></h1>
            <p>Clinical Intelligence</p>
          </div>
        </div>
        <div class="sidebar-footer">
          <p>System Version 4.0.2</p>
          <p>Encrypted Session</p>
        </div>
      </aside>

      <section class="auth-viewport">
        <div class="auth-card">
          <div class="card-header">
            <div class="mode-indicator">
              <button
                id="toggleSignin"
                class="active"
                onclick="showMode('signin')"
              >
                Authentication
              </button>
              <button id="toggleSignup" onclick="showMode('signup')">
                Registration
              </button>
            </div>
            <h2 id="formTitle">Access Portal</h2>
            <p id="formSubtitle">Enter institutional credentials to proceed.</p>
          </div>

          <form id="authForm" class="clinical-form">
            <div id="roleSelection" class="form-section hidden">
              <span class="label-heading">Account Type</span>
              <div class="role-selector">
                <div
                  class="role-option active"
                  data-role="patient"
                  onclick="setRole('patient')"
                >
                  Patient
                </div>
                <div
                  class="role-option"
                  data-role="doctor"
                  onclick="setRole('doctor')"
                >
                  Medical Staff
                </div>
              </div>
            </div>

            <div class="input-stack">
              <div id="idField" class="input-group">
                <label for="userId">Institutional ID</label>
                <input
                  type="text"
                  id="userId"
                  placeholder="PAT-0000"
                  required
                />
              </div>

              <div id="nameField" class="input-group hidden">
                <label for="userName">Full Name</label>
                <input
                  type="text"
                  id="userName"
                  placeholder="Surname, First Name"
                />
              </div>

              <div id="contactSection" class="hidden">
                <span class="label-heading"
                  >Contact Information (At least one required)</span
                >
                <div class="input-group">
                  <label for="userEmail">Email Address</label>
                  <input
                    type="email"
                    id="userEmail"
                    placeholder="staff@healthbridge.org"
                  />
                </div>
                <div class="input-group">
                  <label for="userPhone">Phone Number</label>
                  <input
                    type="text"
                    id="userPhone"
                    placeholder="+8801XXXXXXXXX"
                  />
                </div>
              </div>

              <div class="input-row">
                <div id="bloodGroupField" class="input-group hidden">
                  <label for="bloodGroup">Serotype</label>
                  <select id="bloodGroup">
                    <option value="">--</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                  </select>
                </div>

                <div id="deptField" class="input-group hidden">
                  <label for="department">Department</label>
                  <input
                    type="text"
                    id="department"
                    placeholder="Internal Med."
                  />
                </div>
              </div>
            </div>

            <button type="submit" class="primary-action-btn" id="submitBtn">
              Authorize
            </button>
          </form>

          <div id="messageBox" class="status-msg hidden"></div>
        </div>
      </section>
    </div>
    <script src="auth.js"></script>
  </body>
</html>
